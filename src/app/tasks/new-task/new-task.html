<div class="backdrop"></div>
<dialog open>
<h2>Add Task</h2>
<form #taskForm="ngForm" (ngSubmit)="onSubmit(taskForm)" >
<p>
<label for="title">Title</label>
<input type="text" id="title" [(ngModel)]="title" name="title" #titleControl="ngModel" required maxlength="18"/>
</p>
@if(titleControl.invalid&&titleControl.touched){
<p class="error-messages">ERROR</p>
}

<p>
<label for="summary">Summary</label>
<textarea id="summary" rows="5" [(ngModel)]="summary" name="summary" required maxlength="50"></textarea>
</p>
<p>
<label for="due-date">Due Date</label>
<input type="date" id="dueDate" [(ngModel)]="dueDate" name="dueDate" required/>
</p>
<p class="actions">
<button type="button">Cancel</button>
<button type="submit" [disabled]="taskForm.form.invalid">Create</button>
</p>
</form>
</dialog>
